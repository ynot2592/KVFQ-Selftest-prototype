<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CCLRU 기반 안구 충혈도 유사도 분석</title>

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f4f6f8;
    color: #1f2937;
  }

  .wrap {
    width: min(960px, 100%);
    margin: 0 auto;
    padding: 20px;
  }

  .card {
    background: #ffffff;
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 16px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  }

  h1 {
    font-size: 22px;
    margin: 0 0 10px;
  }

  h2 {
    font-size: 18px;
    margin: 0 0 10px;
  }

  p {
    line-height: 1.6;
    margin: 8px 0;
  }

  .muted {
    color: #6b7280;
    font-size: 14px;
  }

  input[type="file"] {
    width: 100%;
    padding: 12px;
    border: 1px solid #d1d5db;
    border-radius: 12px;
    background: #fff;
    font-size: 16px;
  }

  canvas {
    width: 100%;
    max-width: 720px;
    border: 1px solid #d1d5db;
    border-radius: 12px;
    background: #111827;
    display: block;
    margin-top: 12px;
  }

  .btn {
    width: 100%;
    border: 0;
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 16px;
    font-weight: 700;
    background: #2563eb;
    color: white;
    cursor: pointer;
    margin-top: 12px;
  }

  .btn:disabled {
    background: #9ca3af;
    cursor: not-allowed;
  }

  .result-box {
    border-radius: 14px;
    background: #eef2ff;
    padding: 16px;
    margin-top: 12px;
  }

  .result-main {
    font-size: 24px;
    font-weight: 800;
    color: #1d4ed8;
    margin-bottom: 8px;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
  }

  .metric {
    background: #f9fafb;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    padding: 12px;
  }

  .metric strong {
    display: block;
    margin-bottom: 4px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 12px;
    font-size: 14px;
  }

  th, td {
    border-bottom: 1px solid #e5e7eb;
    padding: 8px;
    text-align: left;
  }

  th {
    background: #f9fafb;
  }

  .warning {
    background: #fff7ed;
    border: 1px solid #fed7aa;
    color: #9a3412;
    border-radius: 12px;
    padding: 12px;
  }
</style>
</head>

<body>
<div class="wrap">
  <div class="card">
    <h1>CCLRU 기반 안구 충혈도 유사도 분석</h1>
    <p class="muted">
      업로드된 안구 이미지를 CCLRU 1–4단계 기준 이미지와 비교하여 가장 유사한 단계를 탐색적으로 산출합니다.
      본 결과는 진단 목적이 아닌 연구용 보조 지표입니다.
    </p>
  </div>

  <div class="card">
    <h2>1. 안구 사진 업로드</h2>
    <input id="imageInput" type="file" accept="image/*" />
    <canvas id="previewCanvas"></canvas>
    <button id="analyzeBtn" class="btn" disabled>분석하기</button>
  </div>

  <div class="card">
    <h2>2. 자동 분석 결과</h2>
    <div id="status" class="warning">
      아직 분석 전입니다. 안구 사진을 업로드한 뒤 분석하기 버튼을 눌러주세요.
    </div>

    <div id="result" class="result-box" style="display:none;">
      <div class="result-main" id="bestGradeText"></div>

      <div class="grid">
        <div class="metric">
          <strong>유사도</strong>
          <span id="similarityText"></span>
        </div>
        <div class="metric">
          <strong>업로드 이미지 Redness Index</strong>
          <span id="rednessText"></span>
        </div>
        <div class="metric">
          <strong>해석</strong>
          <span id="interpretationText"></span>
        </div>
      </div>

      <table>
        <thead>
          <tr>
            <th>CCLRU Grade</th>
            <th>Reference Redness Index</th>
            <th>차이값</th>
          </tr>
        </thead>
        <tbody id="distanceTable"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const referenceImages = [
  { grade: 1, label: "Very slight", src: "reference/grade1.png" },
  { grade: 2, label: "Slight", src: "reference/grade2.png" },
  { grade: 3, label: "Moderate", src: "reference/grade3.png" },
  { grade: 4, label: "Severe", src: "reference/grade4.png" }
];

const imageInput = document.getElementById("imageInput");
const analyzeBtn = document.getElementById("analyzeBtn");
const canvas = document.getElementById("previewCanvas");
const ctx = canvas.getContext("2d");

const statusBox = document.getElementById("status");
const resultBox = document.getElementById("result");
const bestGradeText = document.getElementById("bestGradeText");
const similarityText = document.getElementById("similarityText");
const rednessText = document.getElementById("rednessText");
const interpretationText = document.getElementById("interpretationText");
const distanceTable = document.getElementById("distanceTable");

let uploadedImage = null;
let referenceData = [];

let roi = null;

let isDragging = false;
let startX = 0;
let startY = 0;

/**
 * 이미지 로드 함수
 */
function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error("이미지를 불러오지 못했습니다: " + src));
    img.src = src;
  });
}

/**
 * 이미지를 canvas에 그린 뒤 ImageData 추출
 */
function getImageDataFromImage(img, maxWidth = 500) {
  const tempCanvas = document.createElement("canvas");
  const tempCtx = tempCanvas.getContext("2d");

  const scale = Math.min(1, maxWidth / img.width);
  const w = Math.round(img.width * scale);
  const h = Math.round(img.height * scale);

  tempCanvas.width = w;
  tempCanvas.height = h;
  tempCtx.drawImage(img, 0, 0, w, h);

  return tempCtx.getImageData(0, 0, w, h);
}

/**
 * Redness Index 계산
 * 
 * 핵심 원리:
 * - 너무 어두운 픽셀은 제외
 * - 너무 밝아서 색 정보가 약한 픽셀도 일부 제외
 * - R, G, B 중 R 성분이 상대적으로 높은 정도를 계산
 */
function calculateRednessIndex(imageData) {
  const data = imageData.data;

  let sumRedness = 0;
  let validPixelCount = 0;

  for (let i = 0; i < data.length; i += 4) {
    const r = data[i];
    const g = data[i + 1];
    const b = data[i + 2];

    const brightness = (r + g + b) / 3;

    // 너무 어두운 영역: 홍채, 눈썹, 그림자 등 제외
    if (brightness < 45) continue;

    // 너무 밝은 흰색 영역은 완전히 제외하지 않고 약하게 반영
    // 기본 redness 계산
    const rgbSum = r + g + b + 1;
    const redRatio = r / rgbSum;

    // 초록/파랑 대비 빨강 우세 정도
    const redDominance = (r - ((g + b) / 2)) / 255;

    // 최종 redness index
    const redness = (redRatio * 0.6) + (Math.max(0, redDominance) * 0.4);

    sumRedness += redness;
    validPixelCount++;
  }

  if (validPixelCount === 0) return 0;

  return sumRedness / validPixelCount;
}

/**
 * 기준 이미지 1~4단계 redness index 계산
 */
async function loadReferenceData() {
  referenceData = [];

  for (const ref of referenceImages) {
    const img = await loadImage(ref.src);
    const imageData = getImageDataFromImage(img);
    const redness = calculateRednessIndex(imageData);

    referenceData.push({
      ...ref,
      redness
    });
  }

  console.log("Reference data:", referenceData);
}

/**
 * 업로드 이미지 미리보기
 */
imageInput.addEventListener("change", async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const objectUrl = URL.createObjectURL(file);
  uploadedImage = await loadImage(objectUrl);

  const maxCanvasWidth = 720;
  const scale = Math.min(1, maxCanvasWidth / uploadedImage.width);
  const w = Math.round(uploadedImage.width * scale);
  const h = Math.round(uploadedImage.height * scale);

  canvas.width = w;
  canvas.height = h;
  roi = null;
  redrawCanvas();

  analyzeBtn.disabled = false;
  resultBox.style.display = "none";
  statusBox.style.display = "block";
  statusBox.textContent = "이미지가 업로드되었습니다. 분석하기 버튼을 눌러주세요.";
});


canvas.addEventListener("mousedown", (e) => {
  if (!uploadedImage) return;

  const rect = canvas.getBoundingClientRect();

  startX = e.clientX - rect.left;
  startY = e.clientY - rect.top;

  isDragging = true;
});

canvas.addEventListener("mousemove", (e) => {
  if (!isDragging || !uploadedImage) return;

  const rect = canvas.getBoundingClientRect();

  const currentX = e.clientX - rect.left;
  const currentY = e.clientY - rect.top;

  roi = {
    x: Math.min(startX, currentX),
    y: Math.min(startY, currentY),
    w: Math.abs(currentX - startX),
    h: Math.abs(currentY - startY)
  };

  redrawCanvas();
});

canvas.addEventListener("mouseup", () => {
  isDragging = false;
});

function redrawCanvas() {
  if (!uploadedImage) return;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.drawImage(uploadedImage, 0, 0, canvas.width, canvas.height);

  if (roi) {
    ctx.strokeStyle = "#00ff88";
    ctx.lineWidth = 3;
    ctx.strokeRect(roi.x, roi.y, roi.w, roi.h);

    ctx.fillStyle = "rgba(0,255,136,0.15)";
    ctx.fillRect(roi.x, roi.y, roi.w, roi.h);
  }
}

/**
 * 분석 실행
 */
analyzeBtn.addEventListener("click", async () => {
  if (!uploadedImage) return;

  if (referenceData.length === 0) {
    statusBox.textContent = "기준 이미지를 불러오는 중입니다.";
    await loadReferenceData();
  }

  const tempCanvas = document.createElement("canvas");
const tempCtx = tempCanvas.getContext("2d");

tempCanvas.width = canvas.width;
tempCanvas.height = canvas.height;

tempCtx.drawImage(uploadedImage, 0, 0, canvas.width, canvas.height);

let uploadedImageData;

if (roi && roi.w > 10 && roi.h > 10) {
  uploadedImageData = tempCtx.getImageData(
    roi.x,
    roi.y,
    roi.w,
    roi.h
  );
} else {
  uploadedImageData = tempCtx.getImageData(
    0,
    0,
    canvas.width,
    canvas.height
  );
}
  const uploadedRedness = calculateRednessIndex(uploadedImageData);

  const distances = referenceData.map(ref => ({
    grade: ref.grade,
    label: ref.label,
    redness: ref.redness,
    distance: Math.abs(uploadedRedness - ref.redness)
  }));

  distances.sort((a, b) => a.distance - b.distance);

  const best = distances[0];

  const maxDistance = Math.max(...distances.map(d => d.distance), 0.0001);
  const similarity = Math.max(0, 1 - (best.distance / maxDistance)) * 100;

  bestGradeText.textContent = `가장 유사한 단계: CCLRU Grade ${best.grade} (${best.label})`;
  similarityText.textContent = `${similarity.toFixed(1)}%`;
  rednessText.textContent = uploadedRedness.toFixed(4);
  interpretationText.textContent =
    `업로드된 안구 이미지는 내부 기준 이미지와 비교했을 때 CCLRU Grade ${best.grade} 수준과 가장 유사하게 분류되었습니다.`;

  distanceTable.innerHTML = "";
  distances
    .slice()
    .sort((a, b) => a.grade - b.grade)
    .forEach(d => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>Grade ${d.grade} (${d.label})</td>
        <td>${d.redness.toFixed(4)}</td>
        <td>${d.distance.toFixed(4)}</td>
      `;
      distanceTable.appendChild(tr);
    });

  statusBox.style.display = "none";
  resultBox.style.display = "block";
});



/**
 * 시작 시 reference 이미지가 있는지 확인
 */
window.addEventListener("load", async () => {
  try {
    await loadReferenceData();
    statusBox.textContent = "기준 이미지가 정상적으로 불러와졌습니다. 안구 사진을 업로드해주세요.";
  } catch (err) {
    statusBox.textContent =
      "기준 이미지를 불러오지 못했습니다. reference 폴더와 grade1.png~grade4.png 파일명을 확인해주세요.";
    console.error(err);
  }
});
</script>
</body>
</html>
